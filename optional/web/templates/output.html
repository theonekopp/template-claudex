<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem 1.5rem; color: #222; }
    header { border-bottom: 1px solid #ddd; padding-bottom: 0.75rem; margin-bottom: 1.5rem; }
    header h1 { font-size: 1.4rem; margin: 0 0 0.25rem; }
    header .meta { font-size: 0.85rem; color: #666; margin: 0; }
    h2 { font-size: 1.1rem; margin-top: 1.75rem; border-bottom: 1px solid #eee; padding-bottom: 0.25rem; }
    h3 { font-size: 1rem; margin-top: 1.25rem; }
    p, li { line-height: 1.65; }
    ul, ol { padding-left: 1.25rem; }
    a { color: #0066cc; }
    code { background: #f4f4f4; padding: 0.1em 0.35em; border-radius: 3px; font-size: 0.9em; }
    @media (max-width: 600px) { body { padding: 0.75rem 1rem; } }
  </style>
</head>
<body>
  <header>
    <h1>{{TITLE}}</h1>
    <p class="meta">{{SKIN_NAME}} &middot; {{DATE}}</p>
  </header>
  <main>
    <!-- Output content goes here -->
  </main>
</body>
</html>
